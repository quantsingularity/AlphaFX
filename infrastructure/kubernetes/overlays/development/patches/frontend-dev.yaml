apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: alphafx
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
