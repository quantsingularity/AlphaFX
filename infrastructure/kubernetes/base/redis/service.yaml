apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: alphafx
  labels:
    app.kubernetes.io/name: alphafx
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  clusterIP: None # Headless service for StatefulSet DNS
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
