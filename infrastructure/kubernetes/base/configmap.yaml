apiVersion: v1
kind: ConfigMap
metadata:
  name: alphafx-config
  namespace: alphafx
  labels:
    app.kubernetes.io/name: alphafx
    app.kubernetes.io/component: config
data:
  # Django settings
  DJANGO_SETTINGS_MODULE: "alphafx.settings.base"
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,alphafx.example.com"
  CORS_ALLOWED_ORIGINS: "https://alphafx.example.com"

  # Database
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "alphafx"
  DATABASE_USER: "alphafx"

  # Redis
  REDIS_URL: "redis://redis:6379/0"
  AI_REDIS_URL: "redis://redis:6379/1"

  # App config
  CACHE_TTL: "60"
  RISK_FREE_RATE: "0.05"

  # AI service
  AI_MODEL_DIR: "/app/saved_models"
  AI_SERVICE_URL: "http://ai-services:8001"
