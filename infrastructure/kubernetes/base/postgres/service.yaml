apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: alphafx
  labels:
    app.kubernetes.io/name: alphafx
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  clusterIP: None # Headless service for StatefulSet DNS
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
