apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alphafx-role
  namespace: alphafx
  labels:
    app.kubernetes.io/name: alphafx
    app.kubernetes.io/component: rbac
rules:
  # Allow pods to read their own ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Allow reading pod info (useful for leader election / health checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
